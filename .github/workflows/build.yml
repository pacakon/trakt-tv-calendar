name: Build Calendar

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 🔥 Přesunuto nahoru — spustí se jako první, takže device code bude okamžitě
      - name: Ensure Trakt token (Device Code Flow)
        run: python token_manager.py

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run calendar generator
        run: python generate_calendar.py

      - name: Save token state
        uses: actions/upload-artifact@v4
        with:
          name: token_state
          path: token_state.json
